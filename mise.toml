[tools]
go = "1.26.2"
node = "26"

[tasks]
wasm = "GOOS=js GOARCH=wasm go build -o public/expr.wasm ./wasm"
dev = "./node_modules/.bin/vite dev"
build = "./node_modules/.bin/vite build"

"wasm:all" = { depends = ["wasm"], description = "Build WASM binary" }
server = { depends = ["wasm", "build"], description = "Build Go server binary embedding static assets", run = "CGO_ENABLED=0 go build -o expr-editor ." }

docker = { depends = ["server"], description = "Build Docker image", run = "docker build -t expr-editor ." }

npm-pkg = { depends = ["build"], description = "Prepare npm package for publishing", run = "node scripts/npm-prep.js" }

clean = { description = "Remove build artifacts", run = [
  "rm -f expr-editor",
  "rm -rf npm-package",
] }
