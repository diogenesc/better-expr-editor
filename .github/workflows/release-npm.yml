name: Release (npm)

on:
  push:
    tags:
      - "v*"

jobs:
  release-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Build
        run: |
          GOOS=js GOARCH=wasm go build -o public/expr.wasm ./wasm
          npm ci
          npm run build

      - name: Publish
        run: npm publish
