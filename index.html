<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expr Editor</title>
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div id="toolbar-left">
        <button id="btn-format" title="Format expression (Shift+Alt+F)">Format</button>
        <button id="btn-run" title="Run expression (Ctrl+Enter)">Run</button>
      </div>
      <div id="toolbar-right">
        <button id="btn-theme" title="Toggle dark/light theme">🌙</button>
      </div>
    </header>
    <main id="main">
      <section id="editor-pane">
        <div id="editor-container"></div>
        <div id="env-editor">
          <div id="env-editor-header">
            <span>Env JSON</span>
            <button id="btn-env-format" title="Format JSON">Format</button>
          </div>
          <div id="env-editor-container"></div>
        </div>
      </section>
      <section id="output-pane">
        <div id="output-loading" class="hidden">Loading WASM…</div>
        <div id="output-contents">
          <div id="output-result" class="output-section">
            <h3>Result</h3>
            <div id="result-editor-container" class="cm-readonly"></div>
          </div>
          <div id="output-errors" class="output-section hidden">
            <h3>Errors</h3>
            <pre id="errors-value"></pre>
          </div>

        </div>
      </section>
    </main>
    <footer id="statusbar">
      <span id="status-cursor">Ln 1, Col 1</span>
      <span id="status-length">0 chars</span>
      <span id="status-info"></span>
    </footer>
  </div>
  <script src="wasm_exec.js"></script>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
